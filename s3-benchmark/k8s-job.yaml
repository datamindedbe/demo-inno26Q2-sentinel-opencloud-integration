apiVersion: batch/v1
kind: Job
metadata:
  name: s3-benchmark
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: s3-benchmark
          image: ghcr.io/datamindedbe/demo-inno26q2-sentinel-opencloud-integration/s3-benchmark:latest
          args:
            - "--big-file-size-mb=100"
            - "--small-file-count=100"
            - "--processes=4"
          env:
            # S3 proxy endpoint (the reverse proxy, not real S3)
            - name: S3_ENDPOINT_URL
              value: "https://<proxy-host>"
            - name: S3_BUCKET
              value: "<your-bucket-name>"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"

            # STS / OIDC auth — remove this block for standard AWS IAM auth
            - name: KEYCLOAK_URL
              value: "https://<keycloak-host>/realms/s3sentinel/protocol/openid-connect/token"
            - name: STS_ENDPOINT_URL
              value: "https://<sts-host>"
            - name: OIDC_CLIENT_ID
              value: "s3sentinel"
            - name: ROLE_ARN
              value: "arn:aws:iam::000000000000:role/s3sentinel"
            - name: OIDC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: s3-benchmark-oidc
                  key: username
            - name: OIDC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: s3-benchmark-oidc
                  key: password
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      imagePullSecrets:
        - name: ghcr-pull-secret

# --- Setup commands ---
#
# OIDC credentials secret:
#   kubectl create secret generic s3-benchmark-oidc \
#     --from-literal=username=admin \
#     --from-literal=password=admin123
#
# GHCR pull secret:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=WRRB \
#     --docker-password=$(gh auth token)
#
# Standard AWS IAM auth (alternative — replace the STS block above with):
#   kubectl create secret generic s3-benchmark-credentials \
#     --from-literal=access-key-id=YOUR_KEY \
#     --from-literal=secret-access-key=YOUR_SECRET
#   env:
#     - name: AWS_ACCESS_KEY_ID
#       valueFrom: { secretKeyRef: { name: s3-benchmark-credentials, key: access-key-id } }
#     - name: AWS_SECRET_ACCESS_KEY
#       valueFrom: { secretKeyRef: { name: s3-benchmark-credentials, key: secret-access-key } }
