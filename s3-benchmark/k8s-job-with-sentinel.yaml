apiVersion: batch/v1
kind: Job
metadata:
  name: s3-benchmark-sentinel
  namespace: benchmark
spec:
  ttlSecondsAfterFinished: 60
  # Run @@PARALLELISM@@ pods concurrently (templated by the Makefile). Each pod
  # self-assigns a random RUN_ID, so they isolate their own object keys.
  completions: @@PARALLELISM@@
  parallelism: @@PARALLELISM@@
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: s3-benchmark
          image: ghcr.io/datamindedbe/demo-inno26q2-sentinel-opencloud-integration/s3-benchmark:latest
          # Values below are templated by the Makefile (sed) at deploy time.
          # Deploy via `make run_without` / `make run_with`, not raw kubectl apply.
          args:
            - "--big-file-size-mb=@@BIG_FILE_SIZE_MB@@"
            - "--small-file-count=@@SMALL_FILE_COUNT@@"
            - "--processes=@@PROCESSES@@"
          env:
            # S3 proxy (in-cluster)
            - name: S3_ENDPOINT_URL
              value: "http://s3sentinel.services.svc.cluster.local:8080"
            - name: S3_BUCKET
              value: "dp-data-bucket"
            - name: AWS_DEFAULT_REGION
              value: "europe-1"

            # STS endpoint (in-cluster admin port)
            - name: STS_ENDPOINT_URL
              value: "http://s3sentinel.services.svc.cluster.local:8090"

            # ZITADEL OIDC — client_credentials grant (external URL so JWT issuer matches)
            - name: KEYCLOAK_URL
              value: "https://zitadel.sentinel.playground.dataminded.cloud/oauth/v2/token"
            - name: OIDC_GRANT_TYPE
              value: "client_credentials"
            # Zitadel service-user identity (product-0..29), templated by the
            # Makefile. Its client_id/client_secret are resolved at runtime from
            # the secrets.json baked into the image.
            - name: OIDC_IDENTITY
              value: "@@IDENTITY@@"
            # Scope must include the s3sentinel project audience so the proxy accepts the JWT
            - name: OIDC_SCOPE
              value: "openid urn:zitadel:iam:org:project:id:375932491829084258:aud"
            - name: ROLE_ARN
              value: "arn:s3sentinel:iam::000000000000:role/s3sentinel"

            # Prometheus Pushgateway — each pod pushes its per-operation results
            # here on completion; Prometheus scrapes it and Grafana aggregates
            # across all parallel pods (grouped by run_id + identity).
            - name: PUSHGATEWAY_URL
              value: "pushgateway.monitoring.svc.cluster.local:9091"
            # Groups all pods of this run and exposes the run's knobs as labels
            # on the pushed metrics (templated by the Makefile).
            - name: EXPERIMENT_ID
              value: "@@EXPERIMENT_ID@@"
            - name: EXPERIMENT_LABELS
              value: "@@EXPERIMENT_LABELS@@"
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      imagePullSecrets:
        - name: ghcr-pull-secret

# --- Setup commands (one-time) ---
#
# OIDC credentials secret:
#   kubectl create secret generic s3-benchmark-oidc \
#     --from-literal=username=admin \
#     --from-literal=password=admin123
#
# GHCR pull secret:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=WRRB \
#     --docker-password=$(gh auth token)
